<!DOCTYPE html>
<html>
<head>
    <title>Arrow Out Simulator</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #2c3e50; color: white; font-family: sans-serif; 
            margin-top: 50px;
        }
        
        #game-container { 
            width: 350px; height: 350px; border: 5px solid #ecf0f1; 
            background-color: #34495e; position: relative; overflow: hidden;
            /* Ini yang bikin semua isi di dalamnya ke tengah */
            display: flex; align-items: center; justify-content: center;
        }

        /* Tempat parkir panah agar tetap rapi di tengah */
        .slot { display: flex; gap: 10px; position: relative; }

        .arrow { 
            width: 70px; height: 70px; background: #e67e22; 
            border-radius: 12px; display: flex; align-items: center; 
            justify-content: center; font-size: 35px; cursor: pointer; 
            transition: all 0.5s ease; box-shadow: 0 5px #d35400;
            position: relative; /* Berubah dari absolute ke relative agar ikut aliran flex */
        }

        .arrow:active { transform: translateY(4px); box-shadow: 0 2px #d35400; }
    </style>
</head>
<body>
    <h1>ARROW OUT SIMULATOR</h1>
    <div id="game-container">
        <div class="slot">
            <div id="p1" class="arrow" onclick="gas('p1', 'RIGHT')">➡</div>
            <div id="p2" class="arrow" onclick="gas('p2', 'UP')">⬆</div>
        </div>
    </div>

    <script>
        function gas(id, arah) {
            const el = document.getElementById(id);
            const p2 = document.getElementById('p2');

            if (id === 'p1' && p2.style.visibility !== 'hidden') {
                alert("Terhalang Panah Atas!");
                return;
            }

            // Animasi menggunakan transform agar lebih halus
            if (arah === 'RIGHT') {
                el.style.transform = 'translateX(500px)';
            } else if (arah === 'UP') {
                el.style.transform = 'translateY(-500px)';
            }

            setTimeout(() => {
                el.style.visibility = 'hidden';
            }, 500);
        }
    </script>
</body>
</html>
