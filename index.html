<!DOCTYPE html>
<html>
<head>
    <title>Arrow Out - Pro Level</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; font-family: 'Segoe UI', sans-serif; }
        #stats { display: flex; gap: 30px; margin: 20px; font-size: 20px; background: #34495e; padding: 10px 20px; border-radius: 10px; }
        #game-container { 
            width: 350px; height: 350px; border: 8px solid #ecf0f1; border-radius: 20px; 
            background: #34495e; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .arrow { 
            width: 60px; height: 60px; background: #e67e22; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 30px; 
            cursor: pointer; position: absolute; transition: all 0.4s ease-in;
            box-shadow: 0 5px #d35400;
        }
        #win-screen { display: none; text-align: center; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #2ecc71; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>ARROW OUT PRO</h1>
    
    <div id="stats">
        <div>Level: <span id="lvl-display">1</span></div>
        <div>Score: <span id="score-display">0</span></div>
    </div>

    <div id="game-container" id="board"></div>

    <div id="win-screen">
        <h2 id="msg">LEVEL CLEARED!</h2>
        <button onclick="nextLevel()">NEXT LEVEL</button>
    </div>

    <script>
        let currentLevel = 1;
        let score = 0;
        let arrowsInLevel = 0;

        // Data Level (Bisa kamu tambah terus sampai 10)
        const levels = {
            1: [
                // Baris Atas
                {id:'a1', x:-50, y:-40, dir:'UP'}, // Kiri Atas
                {id:'a2', x:50, y:-30, dir:'LEFT'}, // Kanan Atas

                // Baris Bawah
                {id:'a3', x:-50, y:50, dir:'RIGHT'}, // Kiri Bawah
                {id:'a4', x:50, y:50, dir:'UP'} // Kanan Bawah
            ],
            2: [
                // Baris Atas (4 Panah)
                {id:'a1', x:-90, y:-50, dir:'DOWN'},  // Kiri Atas
                {id:'a2', x:-30, y:-50, dir:'LEFT'},  // Tengah Kiri Atas
                {id:'a3', x:30, y:-50, dir:'UP'},    // Tengah Kanan Atas
                {id:'a4', x:90, y:-50, dir:'RIGHT'}, // Kanan Atas

                // Baris Bawah (4 Panah)
                {id:'a5', x:-90, y:50, dir:'LEFT'},   // Kiri Bawah
                {id:'a6', x:-30, y:50, dir:'DOWN'},   // Tengah Kiri Bawah
                {id:'a7', x:30, y:50, dir:'RIGHT'},  // Tengah Kanan Bawah
                {id:'a8', x:90, y:50, dir:'UP'}      // Kanan Bawah
            ],
            3: [
                // Baris Atas
                {id:'a1', x:-100, y:-100, dir:'RIGHT'}, // Kiri Atas
                {id:'a2', x:0, y:-100, dir:'DOWN'},    // Tengah Atas
                {id:'a3', x:100, y:-100, dir:'RIGHT'},  // Kanan Atas

                // Baris Tengah
                {id:'a4', x:-100, y:0, dir:'UP'},      // Kiri Tengah
                {id:'a5', x:0, y:0, dir:'RIGHT'},      // Tengah Tengah
                {id:'a6', x:100, y:0, dir:'DOWN'},     // Kanan Tengah

                // Baris Bawah
                {id:'a7', x:-100, y:100, dir:'LEFT'},   // Kiri Bawah
                {id:'a8', x:0, y:100, dir:'DOWN'},     // Tengah Bawah
                {id:'a9', x:100, y:100, dir:'LEFT'}     // Kanan Bawah
            ],
            4: [
                // Baris 1 (Paling Atas)
                {id:'b1a', x:-105, y:-120, dir:'LEFT'}, 
                {id:'b1b', x:-35, y:-120, dir:'RIGHT'},
                {id:'b1c', x:35, y:-120, dir:'UP'},
                {id:'b1d', x:105, y:-120, dir:'RIGHT'},

                // Baris 2
                {id:'b2a', x:-105, y:-40, dir:'UP'},
                {id:'b2b', x:-35, y:-40, dir:'UP'},
                {id:'b2c', x:35, y:-40, dir:'RIGHT'},
                {id:'b2d', x:105, y:-40, dir:'DOWN'},

                // Baris 3
                {id:'b3a', x:-105, y:40, dir:'RIGHT'},
                {id:'b3b', x:-35, y:40, dir:'DOWN'},
                {id:'b3c', x:35, y:40, dir:'DOWN'},
                {id:'b3d', x:105, y:40, dir:'RIGHT'},

                // Baris 4 (Paling Bawah)
                {id:'b4a', x:-105, y:120, dir:'DOWN'},
                {id:'b4b', x:-35, y:120, dir:'LEFT'},
                {id:'b4c', x:35, y:120, dir:'LEFT'},
                {id:'b4d', x:105, y:120, dir:'LEFT'}
            ],
            // LEVEL 5 - 10 REBORN (Dijamin Bisa Tamat)
            5: [ // Pola: Ujung-ujung bebas keluar
                {id:'L5_1', x:-100, y:-100, dir:'UP'}, {id:'L5_2', x:100, y:-100, dir:'UP'}, 
                {id:'L5_3', x:-100, y:100, dir:'DOWN'}, {id:'L5_4', x:100, y:100, dir:'DOWN'},
                {id:'L5_5', x:0, y:0, dir:'RIGHT'}, {id:'L5_6', x:0, y:-50, dir:'UP'}
            ],
            6: [ // Pola: Spiral dari luar ke dalam
                {id:'L6_1', x:-120, y:-120, dir:'LEFT'}, {id:'L6_2', x:120, y:-120, dir:'RIGHT'},
                {id:'L6_3', x:-120, y:120, dir:'LEFT'}, {id:'L6_4', x:120, y:120, dir:'RIGHT'},
                {id:'L6_5', x:0, y:-120, dir:'UP'}, {id:'L6_6', x:0, y:120, dir:'DOWN'}
            ],
            7: [ // Pola: Cross pembuka
                {id:'L7_1', x:0, y:-130, dir:'UP'}, {id:'L7_2', x:0, y:130, dir:'DOWN'},
                {id:'L7_3', x:-130, y:0, dir:'LEFT'}, {id:'L7_4', x:130, y:0, dir:'RIGHT'},
                {id:'L7_5', x:-40, y:-40, dir:'LEFT'}, {id:'L7_6', x:40, y:40, dir:'RIGHT'}
            ],
            8: [ // Pola: Barisan kabur
                {id:'L8_1', x:-100, y:-100, dir:'UP'}, {id:'L8_2', x:-40, y:-100, dir:'UP'}, {id:'L8_3', x:20, y:-100, dir:'UP'},
                {id:'L8_4', x:-100, y:100, dir:'DOWN'}, {id:'L8_5', x:-40, y:100, dir:'DOWN'}, {id:'L8_6', x:20, y:100, dir:'DOWN'}
            ],
            9: [ // Pola: Blockade sederhana
                {id:'L9_1', x:-50, y:-50, dir:'UP'}, {id:'L9_2', x:50, y:-50, dir:'RIGHT'},
                {id:'L9_3', x:-50, y:50, dir:'LEFT'}, {id:'L9_4', x:50, y:50, dir:'DOWN'},
                {id:'L9_5', x:0, y:0, dir:'UP'}
            ],
            10: [ // FINAL LEVEL: The Grid of Freedom
                {id:'L10_1', x:-120, y:-120, dir:'UP'}, {id:'L10_2', x:0, y:-120, dir:'UP'}, {id:'L10_3', x:120, y:-120, dir:'UP'},
                {id:'L10_4', x:-120, y:0, dir:'LEFT'}, {id:'L10_5', x:0, y:0, dir:'RIGHT'}, {id:'L10_6', x:120, y:0, dir:'RIGHT'},
                {id:'L10_7', x:-120, y:120, dir:'DOWN'}, {id:'L10_8', x:0, y:120, dir:'DOWN'}, {id:'L10_9', x:120, y:120, dir:'DOWN'}
            ]
        };

        // Fungsi Suara Klik (Beep)
        function playSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, context.currentTime);
            osc.connect(context.destination);
            osc.start();
            osc.stop(context.currentTime + 0.1);
        }

        function loadLevel(lvl) {
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            const data = levels[lvl] || levels[1];
            arrowsInLevel = data.length;
            
            data.forEach(config => {
                const div = document.createElement('div');
                div.id = config.id;
                div.className = 'arrow';
                div.innerHTML = getIcon(config.dir);
                div.style.transform = `translate(${config.x}px, ${config.y}px)`;
                div.onclick = () => moveArrow(config.id, config.dir);
                container.appendChild(div);
            });
        }

        function getIcon(dir) {
            return {UP:'⬆️', DOWN:'⬇️', LEFT:'⬅️', RIGHT:'➡️'}[dir];
        }

        function moveArrow(id, dir) {
            playSound();
            const el = document.getElementById(id);
            
            // Animasi Keluar
            if(dir === 'UP') el.style.transform += ' translateY(-600px)';
            if(dir === 'RIGHT') el.style.transform += ' translateX(600px)';
            if(dir === 'LEFT') el.style.transform += ' translateX(-600px)';
            if(dir === 'DOWN') el.style.transform += ' translateY(600px)';

            setTimeout(() => {
                el.style.display = 'none';
                arrowsInLevel--;
                score += 10;
                document.getElementById('score-display').innerText = score;

                if(arrowsInLevel === 0) {
                    document.getElementById('win-screen').style.display = 'block';
                }
            }, 400);
        }

        function nextLevel() {
            currentLevel++;
            if(currentLevel > 10) {
                alert("TAMAT! Kamu Master Arrow Out!");
                currentLevel = 1; score = 0;
            }
            document.getElementById('lvl-display').innerText = currentLevel;
            document.getElementById('win-screen').style.display = 'none';
            loadLevel(currentLevel);
        }

        // Jalankan Level 1 saat start
        loadLevel(1);
    </script>
</body>
</html>
